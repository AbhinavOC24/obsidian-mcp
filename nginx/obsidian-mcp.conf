# obsidian-mcp — nginx reverse proxy
#
# Place this file at: /etc/nginx/sites-available/obsidian-mcp
# Enable it:  sudo ln -s /etc/nginx/sites-available/obsidian-mcp /etc/nginx/sites-enabled/
# Test:       sudo nginx -t
# Reload:     sudo systemctl reload nginx
#
# Prerequisites:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d mcp.yourdomain.com
#
# Replace:
#   mcp.yourdomain.com  → your actual domain
#   3000                → PORT in your .env (if changed)

server {
    listen 80;
    server_name mcp.yourdomain.com;

    # Let Certbot manage TLS — it will replace this block on first run
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name mcp.yourdomain.com;

    # TLS — managed by Certbot (auto-populated after `certbot --nginx`)
    # ssl_certificate     /etc/letsencrypt/live/mcp.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mcp.yourdomain.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           DENY;
    add_header X-Content-Type-Options    nosniff;
    add_header Referrer-Policy           strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Health check — no auth needed
    location = /health {
        proxy_pass         http://127.0.0.1:3000/health;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # MCP SSE endpoint — long-lived connections
    location /sse {
        proxy_pass             http://127.0.0.1:3000/sse;
        proxy_http_version     1.1;
        proxy_set_header       Connection "";
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;

        # SSE requires these — disable buffering so events arrive in real-time
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;  # 1 hour — SSE connections are long-lived
        chunked_transfer_encoding on;
    }

    # MCP message endpoint
    location /message {
        proxy_pass         http://127.0.0.1:3000/message;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 4m;
    }

    # Block everything else
    location / {
        return 404;
    }
}
